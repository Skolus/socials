<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>skolus — socials</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0f;
      --surface:   #141417;
      --border:    #222228;
      --border-h:  #3a3a45;
      --text:      #e8e8f0;
      --muted:     #6b6b7a;
      --accent:    #7c6af5;
      --accent-2:  #a78bfa;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Inter', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(124,106,245,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
    }

    /* header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-family: var(--mono);
      font-size: 1.4rem;
      font-weight: 500;
      color: #fff;
      letter-spacing: -1px;
      box-shadow: 0 0 0 1px rgba(124,106,245,0.3), 0 8px 24px rgba(124,106,245,0.2);
    }

    .name {
      font-family: var(--mono);
      font-size: 1.3rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .tagline {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.3rem;
      font-family: var(--mono);
      letter-spacing: 0.05em;
    }

    /* links list */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
      cursor: pointer;
    }

    .link-item:hover {
      border-color: var(--border-h);
      background: #18181e;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }

    .link-item:active {
      transform: translateY(0);
    }

    .link-icon {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 20px;
      height: 20px;
    }

    .icon-twitter  { background: rgba(29,155,240,0.12);  color: #1d9bf0; }
    .icon-discord  { background: rgba(88,101,242,0.12);  color: #5865f2; }
    .icon-twitter-alt { background: rgba(124,106,245,0.12); color: var(--accent-2); }

    .link-text {
      flex: 1;
    }

    .link-label {
      font-size: 0.72rem;
      font-family: var(--mono);
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.15rem;
    }

    .link-handle {
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
    }

    .link-arrow {
      color: var(--muted);
      transition: color 0.18s, transform 0.18s;
      flex-shrink: 0;
    }

    .link-item:hover .link-arrow {
      color: var(--accent-2);
      transform: translateX(3px);
    }

    /* section label */
    .section-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
      padding-left: 0.25rem;
    }

    /* divider between groups */
    .group + .group {
      margin-top: 1.5rem;
    }

    /* footer */
    .footer {
      text-align: center;
      margin-top: 2.5rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--border-h);
      letter-spacing: 0.04em;
    }

    @media (prefers-reduced-motion: reduce) {
      .link-item { transition: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="avatar"><img src="skolus.png" alt="skolus" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;" /></div>
      <div class="name">skolus</div>
      <div class="tagline">// my accounts</div>
    </div>

    <div class="links">

      <div class="group">
        <div class="section-label">twitter / x</div>

        <a class="link-item" href="https://twitter.com/skoluss" target="_blank" rel="noopener">
          <div class="link-icon icon-twitter">
            <!-- X / Twitter icon -->
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.259 5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </div>
          <div class="link-text">
            <div class="link-label">main account</div>
            <div class="link-handle">@skoluss</div>
          </div>
          <div class="link-arrow">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 8h10M9 4l4 4-4 4"/>
            </svg>
          </div>
        </a>

        <a class="link-item" style="margin-top:0.75rem" href="https://twitter.com/JordanGavins" target="_blank" rel="noopener">
          <div class="link-icon icon-twitter-alt">
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.259 5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </div>
          <div class="link-text">
            <div class="link-label">alt account</div>
            <div class="link-handle">@JordanGavins</div>
          </div>
          <div class="link-arrow">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 8h10M9 4l4 4-4 4"/>
            </svg>
          </div>
        </a>
      </div>

      <div class="group">
        <div class="section-label">discord</div>

        <div class="link-item" onclick="navigator.clipboard.writeText('skolus').then(()=>{const h=this.querySelector('.link-handle');const prev=h.textContent;h.textContent='copied!';setTimeout(()=>h.textContent=prev,1500)})">
          <div class="link-icon icon-discord">
            <!-- Discord icon -->
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
            </svg>
          </div>
          <div class="link-text">
            <div class="link-label">click to copy username</div>
            <div class="link-handle">@skolus</div>
          </div>
          <div class="link-arrow">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="5" y="5" width="8" height="8" rx="1.5"/>
              <path d="M3 11V3h8"/>
            </svg>
          </div>
        </div>
      </div>

    </div>

    <div class="footer">skolus &middot; 2026</div>
  </div>
</body>
</html>
